* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
}

header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-inner {
  max-width: 960px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 58px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-badge {
  background: var(--accent);
  color: #0a0c10;
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.04em;
  padding: 4px 8px;
  border-radius: 5px;
}

.logo-name {
  font-family: 'Oswald', sans-serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-date { font-size: 12px; color: var(--muted); }

#refresh-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 5px 12px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  transition: all 0.18s;
}

#refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

.filter-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }

.filter-inner {
  max-width: 960px;
  margin: 0 auto;
  display: flex;
  gap: 4px;
  padding: 10px 0;
}

.filter-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 500;
  padding: 5px 14px;
  border-radius: 20px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.18s;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.filter-btn:hover,
.filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #0a0c10;
}

main {
  max-width: 960px;
  margin: 0 auto;
  padding: 26px 20px 60px;
}

#status-bar {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 22px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
}
.status-dot.live  { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
.status-dot.error { background: #ef4444; }

.section-head {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  margin-top: 30px;
}
.section-head:first-child { margin-top: 0; }

.section-head h2 {
  font-family: 'Oswald', sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text);
  white-space: nowrap;
}

.section-line { flex: 1; height: 1px; background: var(--border); }

.section-count {
  font-size: 11px;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 20px;
}

.events-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  margin-bottom: 6px;
}

@media (min-width: 560px) { .events-grid { grid-template-columns: 1fr 1fr; } }
@media (min-width: 860px) { .events-grid { grid-template-columns: 1fr 1fr 1fr; } }

.event-card {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 13px 14px;
  text-decoration: none;
  color: inherit;
  transition: border-color 0.18s, background 0.18s, transform 0.12s;
  position: relative;
}

.event-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 10px 0 0 10px;
  background: transparent;
  transition: background 0.18s;
}

.event-card:hover {
  border-color: #323852;
  background: #1c2130;
  transform: translateY(-1px);
}

.event-card:hover::before { background: var(--accent); }

.sport-icon {
  width: 36px; height: 36px;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  flex-shrink: 0;
}

.event-info { flex: 1; min-width: 0; }

.event-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 5px;
}

.event-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.event-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 4px;
}

.event-date { font-size: 11px; color: var(--muted); }

.event-arrow {
  color: var(--border);
  font-size: 18px;
  flex-shrink: 0;
  transition: color 0.15s, transform 0.15s;
}

.event-card:hover .event-arrow { color: var(--accent); transform: translateX(2px); }

/* Skeleton */
.skeleton {
  background: linear-gradient(90deg, var(--card) 25%, #1e2333 50%, var(--card) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: var(--radius);
  height: 66px;
  border: 1px solid var(--border);
  margin-bottom: 8px;
}

@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.state-msg { text-align: center; padding: 60px 20px; color: var(--muted); }
.state-msg .icon { font-size: 40px; margin-bottom: 12px; }

#no-results { display: none; text-align: center; padding: 60px 20px; color: var(--muted); }

footer {
  border-top: 1px solid var(--border);
  padding: 20px;
  text-align: center;
  font-size: 12px;
  color: var(--muted);
}
footer a { color: var(--accent); text-decoration: none; }

<body>

<header>
  <div class="header-inner">
    <a class="logo" href="https://sports803livestream.blogspot.com" target="_blank">
      <span class="logo-badge">S803</span>
      <span class="logo-name">Sports 803</span>
    </a>
    <div class="header-right">
      <span class="header-date" id="header-date"></span>
      <button id="refresh-btn" onclick="loadFeed()">↻ Refresh</button>
    </div>
  </div>
</header>

<div class="filter-bar">
  <div class="filter-inner" id="filter-bar">
    <button class="filter-btn active" data-label="all">All</button>
  </div>
</div>

<main>
  <div id="status-bar">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Fetching latest posts from Sports 803…</span>
  </div>

  <div id="sections-container">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>

  <div id="no-results">
    <div class="icon">📭</div>
    No events found for this category today.
  </div>
</main>

<footer>
  Live feed from
  <a href="https://sports803livestream.blogspot.com" target="_blank">sports803livestream.blogspot.com</a>
  &nbsp;·&nbsp; Showing posts from the last 24 hours · auto-refreshes every 5 min
</footer>

<script>
// ─── CONFIG ───────────────────────────────
const BLOG_URL  = 'https://sports803livestream.blogspot.com';
const MAX_POSTS = 50;
const EXPIRE_MS = 24 * 60 * 60 * 1000; // 24 hours

// ─── SPORT EMOJI ──────────────────────────
const EMOJI_MAP = {
  'champions league':'🏆','ucl':'🏆',
  'la liga':'⚽','laliga':'⚽',
  'serie a':'⚽','bundesliga':'⚽',
  'fa cup':'⚽','epl':'⚽','premier league':'⚽',
  'french league':'⚽','ligue':'⚽',
  'mls':'⚽','europa':'⚽','turkish':'⚽',
  'nba':'🏀','basketball':'🏀',
  'ufc':'🥊','mma':'🥊','boxing':'🥊',
  'wwe':'🤼','wrestling':'🤼',
  'f1':'🏎','formula':'🏎','indycar':'🏎','nascar':'🏎',
  'motogp':'🏍',
  'tennis':'🎾',
  'rugby':'🏉','cricket':'🏏','golf':'⛳',
};

function sportEmoji(label) {
  if (!label) return '🏟';
  const k = label.toLowerCase();
  for (const [key, val] of Object.entries(EMOJI_MAP)) {
    if (k.includes(key)) return val;
  }
  return '🏟';
}

function labelClass(label) {
  if (!label) return 'lc-default';
  return 'lc-' + label.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  if (diff < 60000)    return 'Just posted';
  if (diff < 3600000)  return Math.floor(diff/60000)+'m ago';
  if (diff < 86400000) return Math.floor(diff/3600000)+'h ago';
  return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

// ─── STATE ────────────────────────────────
let allEvents   = [];
let activeLabel = 'all';

// ─── FEED LOADER ──────────────────────────
function loadFeed() {
  setStatus('','Fetching latest posts from Sports 803…');

  const old = document.getElementById('_bfeed');
  if (old) old.remove();

  const s  = document.createElement('script');
  s.id     = '_bfeed';
  // Blogger's built-in JSONP feed — no API key, no CORS
  s.src    = `${BLOG_URL}/feeds/posts/summary?alt=json-in-script&max-results=${MAX_POSTS}&orderby=published&callback=_onFeed&t=${Date.now()}`;
  s.onerror = () => {
    setStatus('error','Could not load feed. Check your internet connection.');
    clearSkeletons();
  };
  document.head.appendChild(s);

  // Timeout guard
  setTimeout(() => {
    if (!allEvents.length) {
      setStatus('error','Feed timed out — try refreshing.');
      clearSkeletons();
    }
  }, 12000);
}

// ─── JSONP CALLBACK ───────────────────────
window._onFeed = function(json) {
  const entries = json.feed.entry || [];
  const now     = Date.now();

  allEvents = entries.map(e => {
    const link  = (e.link||[]).find(l => l.rel==='alternate');
    const label = (e.category||[])[0]?.term || null;
    return {
      title: e.title?.$t || 'Untitled',
      url:   link?.href  || '#',
      date:  e.published?.$t || null,
      label,
    };
  }).filter(e => {
    if (!e.date) return false;
    const age = now - new Date(e.date).getTime();
    return age >= 0 && age <= EXPIRE_MS;
  });

  const shown = allEvents.length;
  setStatus(
    shown ? 'live' : '',
    shown
      ? `${shown} event${shown!==1?'s':''} today · auto-refreshes every 5 min`
      : `No posts in the last 24 hours (${entries.length} total on blog)`
  );

  buildFilterBar();
  render();
};

// ─── FILTER BAR ───────────────────────────
function buildFilterBar() {
  const bar = document.getElementById('filter-bar');
  [...bar.querySelectorAll('.filter-btn:not([data-label="all"])')].forEach(b=>b.remove());

  const labels = [...new Set(allEvents.map(e=>e.label).filter(Boolean))];
  labels.forEach(label => {
    const btn = document.createElement('button');
    btn.className     = 'filter-btn';
    btn.dataset.label = label;
    btn.textContent   = label;
    bar.appendChild(btn);
  });

  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      bar.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      activeLabel = btn.dataset.label;
      render();
    });
  });

  // Restore or reset active
  const act = bar.querySelector(`[data-label="${CSS.escape(activeLabel)}"]`);
  bar.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  (act || bar.querySelector('[data-label="all"]')).classList.add('active');
  if (!act) activeLabel = 'all';
}

// ─── RENDER ───────────────────────────────
function render() {
  const container = document.getElementById('sections-container');
  const noResults = document.getElementById('no-results');

  clearSkeletons();

  const filtered = activeLabel==='all'
    ? allEvents
    : allEvents.filter(e=>(e.label||'').toLowerCase()===activeLabel.toLowerCase());

  if (!filtered.length) {
    container.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  // Group by label
  const groups = {};
  if (activeLabel !== 'all') {
    groups[activeLabel] = filtered;
  } else {
    filtered.forEach(e => {
      const k = e.label || 'Other';
      (groups[k] = groups[k]||[]).push(e);
    });
  }

  container.innerHTML = Object.entries(groups).map(([label, events]) => `
    <div class="section-head">
      <h2>${label}</h2>
      <div class="section-line"></div>
      <span class="section-count">${events.length}</span>
    </div>
    <div class="events-grid">
      ${events.map(e => `
        <a class="event-card" href="${e.url}" target="_blank" rel="noopener">
          <div class="sport-icon">${sportEmoji(e.label)}</div>
          <div class="event-info">
            <div class="event-title" title="${e.title.replace(/"/g,'&quot;')}">${e.title}</div>
            <div class="event-meta">
              ${e.label?`<span class="event-label ${labelClass(e.label)}">${e.label}</span>`:''}
              <span class="event-date">${timeAgo(e.date)}</span>
            </div>
          </div>
          <span class="event-arrow">›</span>
        </a>
      `).join('')}
    </div>
  `).join('');
}

// ─── HELPERS ──────────────────────────────
function setStatus(state, text) {
  document.getElementById('status-dot').className = 'status-dot' + (state?' '+state:'');
  document.getElementById('status-text').textContent = text;
}

function clearSkeletons() {
  const c = document.getElementById('sections-container');
  if (c.querySelector('.skeleton')) c.innerHTML = '';
}

// ─── INIT ─────────────────────────────────
document.getElementById('header-date').textContent =
  new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});

loadFeed();
setInterval(loadFeed, 5*60*1000);
</script>
